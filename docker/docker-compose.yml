# Build from project root:
#   docker compose -f docker/docker-compose.yml build
# Then run e.g.:
#   docker compose -f docker/docker-compose.yml run --rm picoclaw-agent -m "Hello"
#   docker compose -f docker/docker-compose.yml --profile gateway up
#   docker compose -f docker/docker-compose.yml --profile launcher up
#
# Config: container runs as user picoclaw, so it reads ~/.picoclaw = /home/picoclaw/.picoclaw.
# Mount ./data (or host path) there so config.json is found.
services:
  # ─────────────────────────────────────────────
  # PicoClaw Agent (one-shot query)
  # ─────────────────────────────────────────────
  picoclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: picoclaw:local
    container_name: picoclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/home/picoclaw/.picoclaw
    entrypoint: ["picoclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PicoClaw Gateway (Long-running Bot)
  # ─────────────────────────────────────────────
  picoclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: picoclaw:local
    container_name: picoclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/home/picoclaw/.picoclaw

  # ─────────────────────────────────────────────
  # PicoClaw Launcher (Web Console + Gateway)
  # ─────────────────────────────────────────────
  picoclaw-launcher:
    build:
      context: ..
      dockerfile: docker/Dockerfile.launcher
    image: picoclaw-launcher:local
    container_name: picoclaw-launcher
    restart: on-failure
    profiles:
      - launcher
    environment:
      - PICOCLAW_GATEWAY_HOST=0.0.0.0
    ports:
      - "127.0.0.1:18800:18800"
      - "127.0.0.1:18790:18790"
    volumes:
      - ./data:/home/picoclaw/.picoclaw
